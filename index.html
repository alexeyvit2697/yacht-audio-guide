<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Yacht Audio Guide</title>

  <!-- Leaflet: бесплатная карта на OpenStreetMap -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">
    <header class="header">
      <div>
        <p class="eyebrow">Captain Panel</p>
        <h1>Yacht Audio Guide</h1>
        <p class="subtitle">Панель капитана для аудиотура по маршруту</p>
      </div>
      <button id="startButton" class="primary-button">Начать тур</button>
    </header>

    <section class="status-card" id="statusCard">
      <p class="status-label">Статус</p>
      <h2 id="statusTitle">Тур еще не запущен</h2>
      <p id="statusText">Нажми “Начать тур”, разреши геолокацию и держи эту страницу открытой во время прогулки.</p>
    </section>

    <section id="alertCard" class="alert-card hidden">
      <p class="alert-kicker">⚓ Подходим к точке</p>
      <h2 id="alertTitle">Название точки</h2>
      <p id="alertNote">Подсказка капитану</p>
      <audio id="audioPlayer" controls></audio>
      <button id="markPlayedButton" class="secondary-button">Отметить как проигранное</button>
    </section>

    <section class="map-card">
      <div id="map"></div>
    </section>

    <section class="points-card">
      <div class="section-heading">
        <h2>Точки маршрута</h2>
        <p>Можно включать треки вручную</p>
      </div>
      <div id="pointsList" class="points-list"></div>
    </section>
  </main>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Telegram WebApp SDK. В браузере тоже будет работать, просто без Telegram-функций. -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <script src="app.js"></script>
</body>
</html>
